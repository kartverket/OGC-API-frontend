server:
  bind:
    host: 0.0.0.0
    port: 5000
  cors: true
  url: ${PUBLIC_URL}
  mimetype: application/json; charset=UTF-8
  encoding: utf-8
  gzip: false
  languages:
    - en-US
  pretty_print: true
  limits:
    default_items: 20
    max_items: 500
  map:
    url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap contributors</a>'
  admin: false
  templates:
    path: /pygeoapi/custom_templates
    static: /pygeoapi/pygeoapi/static

logging:
  level: DEBUG
  logfile: /logs/pygeoapi.log

metadata:
  identification:
    title:
      en: Administrative enheter
    description:
      en: >
        Datasettet inneholder administrative grenser og områder for Norge, inkludert fylker og kommuner.
    keywords:
      en:
        - Fylke
        - Kommune
        - Administrativ inndeling
        - Administrative grenser
        - Fylkesgrenser
        - Kommunegrenser
        - Riksgrense
    keywords_type: theme
    terms_of_service: https://www.kartverket.no/geodataarbeid/norge-digitalt/partsinformasjon/avtaler-og-vilkar/norge-digitalt-lisens
    url: https://www.kartverket.no

  license:
    name: Norge digitalt-lisens
    url: https://www.kartverket.no/geodataarbeid/norge-digitalt/partsinformasjon/avtaler-og-vilkar/norge-digitalt-lisens
  provider:
    name: Kartverket
    url: https://www.kartverket.no
  contact:
    name: Kartverket
    email: post@kartverket.no
    url: https://www.kartverket.no

resources:
  get-distinct-values:
    type: process
    processor:
      name: distinct_values.DistinctValuesProcessor
  export-collection-gpkg:
    type: process
    processor:
      name: processes.gpkg_collection.ExportCollectionGpkgProcessor
  export-all-gpkg:
    type: process
    processor:
      name: processes.gpkg_all_collections.ExportAllGpkgProcessor 
  export-by-area-gpkg:
    type: process
    processor:
      name: processes.gpkg_by_area.ExportByAreaGpkgProcessor
  export-collection-csv:
    type: process
    processor:
      name: processes.csv_collection.ExportCollectionCsvProcessor
  fylker:
    type: collection
    title:
      en: Fylker
    description:
      en: >
        Datasettet viser fylkesinndelingen i landet med de mest nøyaktige grensene som er registrert digitalt og som er samlet i ett datasett
    keywords:
      en:
        - Fylke
        - Fylkesgrense
    extents:
      spatial:
        bbox: [4.087524, 57.759005, 31.761592, 71.384878]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    links:
      - type: text/html
        rel: related
        title: Geonorge link
        href: https://kartkatalog.geonorge.no/metadata/administrative-enheter-fylker/6093c8a8-fa80-11e6-bc64-92361f002671
    providers:
      - type: feature
        name: schema_provider.SchemaPostgreSQLProvider
        schema_file: /apiconfig/schemas/fylker.json
        data:
          host: ${POSTGRES_HOST}
          dbname: ${POSTGRES_DB}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
          search_path: [administrative_enheter]
        id_field: objid
        table: fylker
        geom_field: omrade
        crs:
          - http://www.opengis.net/def/crs/OGC/1.3/CRS84
          - http://www.opengis.net/def/crs/EPSG/0/25832
          - http://www.opengis.net/def/crs/EPSG/0/25833
          - http://www.opengis.net/def/crs/EPSG/0/25835
          - http://www.opengis.net/def/crs/EPSG/0/4258
          - http://www.opengis.net/def/crs/EPSG/0/4326
          - http://www.opengis.net/def/crs/EPSG/0/3857
        storage_crs: http://www.opengis.net/def/crs/EPSG/0/25833
      - type: tile
        name: MVT-postgresql
        data:
          host: ${POSTGRES_HOST}
          dbname: ${POSTGRES_DB}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
          search_path: [administrative_enheter]
        id_field: objid
        table: fylker
        geom_field: omrade
        storage_crs: http://www.opengis.net/def/crs/EPSG/0/25833
        options:
          zoom:
            min: 12
            max: 18
        format:
          name: pbf
          mimetype: application/vnd.mapbox-vector-tile
      - type: map
        name: postgis_mapscript.PostGISMapScriptProvider
        data: "host=${POSTGRES_HOST} dbname=${POSTGRES_DB} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD}"
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
        options:
          type: MS_LAYER_POLYGON
          layer_data: "omrade FROM administrative_enheter.fylker USING UNIQUE objid USING SRID=25833"
          projection: 25833
          # style: /pygeoapi/styles/fylker.sld <-- Eksempel på hvor styles kan legges og hvordanet refereres til
          style: /apiconfig/styles/fylker.inc
        format:
          name: png
          mimetype: image/png
  kommuner:
    type: collection
    title:
      en: Kommuner
    description:
      en: >
        Datasettet viser kommuneinndelingen i landet med de mest nøyaktige grensene som er registrert digitalt og som er samlet i ett datasett.
    keywords:
      en:
        - Kommune
        - Kommunegrenser
    extents:
      spatial:
        bbox: [4.087524, 57.759005, 31.761592, 71.384878]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    links:
      - type: text/html
        rel: related
        title: Geonorge link
        href: https://kartkatalog.geonorge.no/metadata/administrative-enheter-kommuner/041f1e6e-bdbc-4091-b48f-8a5990f3cc5b
    providers:
      - type: feature
        name: schema_provider.SchemaPostgreSQLProvider
        schema_file: /apiconfig/schemas/kommuner.json
        data:
          host: ${POSTGRES_HOST}
          dbname: ${POSTGRES_DB}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
          search_path: [administrative_enheter]
        id_field: objid
        table: kommuner
        geom_field: omrade
        crs:
          - http://www.opengis.net/def/crs/OGC/1.3/CRS84
          - http://www.opengis.net/def/crs/EPSG/0/25832
          - http://www.opengis.net/def/crs/EPSG/0/25833
          - http://www.opengis.net/def/crs/EPSG/0/25835
          - http://www.opengis.net/def/crs/EPSG/0/4258
          - http://www.opengis.net/def/crs/EPSG/0/4326
          - http://www.opengis.net/def/crs/EPSG/0/3857
        storage_crs: http://www.opengis.net/def/crs/EPSG/0/25833
      - type: tile
        name: MVT-postgresql
        data:
          host: ${POSTGRES_HOST}
          dbname: ${POSTGRES_DB}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
          search_path: [administrative_enheter]
        id_field: objid
        table: kommuner
        geom_field: omrade
        storage_crs: http://www.opengis.net/def/crs/EPSG/0/25833
        options:
          zoom:
            min: 12
            max: 18
        format:
          name: pbf
          mimetype: application/vnd.mapbox-vector-tile
      - type: map
        name: postgis_mapscript.PostGISMapScriptProvider
        data: "host=${POSTGRES_HOST} dbname=${POSTGRES_DB} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD}"
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
        options:
          type: MS_LAYER_POLYGON
          layer_data: "omrade FROM administrative_enheter.kommuner USING UNIQUE objid USING SRID=25833"
          projection: 25833
          style: /apiconfig/styles/kommuner.inc
        format:
          name: png
          mimetype: image/png
  tellekrets:
    type: collection
    title:
      en: Tellekretser
    description:
      en: >
        Datasettet inneholder valgkretser (tellekretser) med kystkontur for Norge,
        inkludert informasjon om valgdistrikt, fylke og kommune.
    keywords:
      en:
        - Tellekrets
        - Valgkrets
        - Valgdistrikt
    extents:
      spatial:
        bbox: [4.087524, 57.759005, 31.761592, 71.384878]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: schema_provider.SchemaPostgreSQLProvider
        schema_file: /apiconfig/schemas/tellekrets.json
        data:
          host: ${POSTGRES_HOST}
          dbname: ${POSTGRES_DB}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
          search_path: [administrative_enheter]
        id_field: nr
        table: tellekretser_kystkontur
        geom_field: omrade
        crs:
          - http://www.opengis.net/def/crs/OGC/1.3/CRS84
          - http://www.opengis.net/def/crs/EPSG/0/25832
          - http://www.opengis.net/def/crs/EPSG/0/25833
          - http://www.opengis.net/def/crs/EPSG/0/25835
          - http://www.opengis.net/def/crs/EPSG/0/4258
          - http://www.opengis.net/def/crs/EPSG/0/4326
          - http://www.opengis.net/def/crs/EPSG/0/3857
        storage_crs: http://www.opengis.net/def/crs/EPSG/0/25833
      - type: tile
        name: MVT-postgresql
        data:
          host: ${POSTGRES_HOST}
          dbname: ${POSTGRES_DB}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
          search_path: [administrative_enheter]
        id_field: nr
        table: tellekretser_kystkontur
        geom_field: omrade
        storage_crs: http://www.opengis.net/def/crs/EPSG/0/25833
        options:
          zoom:
            min: 12
            max: 18
        format:
          name: pbf
          mimetype: application/vnd.mapbox-vector-tile
