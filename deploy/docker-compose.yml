name: kartverket-ogc-api

services: 
  frontend:
    profiles: [with-frontend]  
    build:
      context: ..
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://pygeoapi:5000
      - DATASET_URL=http://localhost:3000
    depends_on:
      pygeoapi:
        condition: service_healthy
    networks:
      - pygeoapi-network

# Init container to create the config volume with the right permissions
# Pygeoapi will create an openapi configfile in that volume on startup
  pygeoapi-init:
    image: busybox
    volumes:
      - ./volumes/apiconfig:/apiconfig
    command: sh -c "chown -R 150:150 /apiconfig && chmod -R 775 /apiconfig"

  pygeoapi:
    build:
      context: ./pygeoapi
    ports:
      - "5000:5000"
      - "9090:9090"
    volumes:
      - ./volumes/apiconfig:/apiconfig
      - ./volumes/pygeoapi-config.yml:/pygeoapi/local.config.yml
    environment:
      - PUBLIC_URL=http://localhost:5000/
      - POSTGRES_HOST=postgis
      - POSTGRES_DB=pygeoapi_test
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=qwer1234
      - CONTAINER_PORT=5000
      - PYGEOAPI_OPENAPI=/apiconfig/openapi.yml
      - PYGEOAPI_CONFIG=/pygeoapi/local.config.yml
    healthcheck:
      test: [
        "CMD-SHELL",
        "python3 -c 'import urllib.request, sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:5000/\").getcode() == 200 else sys.exit(1)'"
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always
    depends_on:
      pygeoapi-init:
        condition: service_completed_successfully
      postgis:
        condition: service_healthy
    networks:
      - pygeoapi-network

  postgis:
    build:
      context: ./postgis
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgis:/var/lib/postgresql/data
    environment:
      - DB_NAME=pygeoapi_test
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=qwer1234k
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${DB_NAME} -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always
    networks:
      - pygeoapi-network
    
networks:
  pygeoapi-network:
    driver: bridge
