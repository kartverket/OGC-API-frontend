name: kartverket-ogc-api

services: 
  front-end:
    build:
      context: ..
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://pygeoapi:5000
      - DATASET_URL=http://localhost:3000
    depends_on:
      pygeoapi:
        condition: service_healthy
    networks:
      - pygeoapi-network

  pygeoapi:
    build:
      context: ./pygeoapi
    ports:
      - "5000:5000"
    volumes:
      - ./volumes/pygeoapi-config.yml:/pygeoapi/local.config.yml
    environment:
      - PUBLIC_URL=http://localhost
      - POSTGRES_HOST=postgis
      - POSTGRES_DB=pygeoapi_test
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=qwer1234
      - CONTAINER_PORT=5000
    healthcheck:
      test: [
        "CMD-SHELL",
        "python3 -c 'import urllib.request, sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:5000/\").getcode() == 200 else sys.exit(1)'"
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always
    depends_on:
      postgis:
        condition: service_healthy
    networks:
      - pygeoapi-network

  postgis:
    build:
      context: ./postgis
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgis:/var/lib/postgresql/data
    environment:
      - DB_NAME=pygeoapi_test
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=qwer1234
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${DB_NAME} -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always
    networks:
      - pygeoapi-network
    
  proxy:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      # - ./nginx.crt:/etc/ssl/certs/selfsigned.crt
      # - ./nginx.key:/etc/ssl/private/selfsigned.key
    ports:
      - "80:80"
    depends_on:
      pygeoapi:
        condition: service_healthy
    networks:
      - pygeoapi-network

networks:
  pygeoapi-network:
    driver: bridge