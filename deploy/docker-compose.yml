name: kartverket-ogc-api

services: 
  front-end:
    build:
      context: ..
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://host.docker.internal:5000
      - DATASET_URL=http://host.docker.internal:3000
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:5000
      - NEXT_PUBLIC_DATASET_URL=http://localhost:3000
    depends_on:
      - pygeoapi

  pygeoapi:
    image: geopython/pygeoapi:latest
    ports:
      - "5000:5000"
    volumes:
      - ./volumes/pygeoapi-config.yml:/pygeoapi/local.config.yml
    environment:
      - POSTGRES_HOST=172.28.64.1
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=qwer1234
      - CONTAINER_PORT=5000
    depends_on:
      postgis:
        condition: service_healthy

  postgis:
    build:
      context: ./postgis
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgis:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=qwer1234
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    

