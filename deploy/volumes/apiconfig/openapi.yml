      - description: The optional f parameter indicates the output format which the
          server shall provide as part of the response document.  The default format
          is GeoJSON.
        explode: false
        in: query
        name: f
        required: false
        schema:
          default: json
          enum:
          - json
          - html
          - jsonld
          - csv
          type: string
        style: form
      - $ref: '#/components/parameters/lang'
      - $ref: '#/components/parameters/bbox'
      - description: The optional limit parameter limits the number of items that
          are presented in the response document (maximum=500, default=20).
        explode: false
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 500
          minimum: 1
          type: integer
        style: form
      - $ref: '#/components/parameters/crs'
      - $ref: '#/components/parameters/bbox-crs'
      - &id001
        description: The properties that should be included. The parameter value is
          a comma-separated list of property names.
        explode: false
        in: query
        name: properties
        required: false
        schema:
          items:
            enum:
            - objid
            - datafangstdato
            - oppdateringsdato
            - datauttaksdato
            - opphav
            - malemetode
            - noyaktighet
            - synbarhet
            - medium
            - verifiseringsdato
            - informasjon
            - fylkesnummer
            - fylkesnavn
            type: string
          type: array
        style: form
      - $ref: '#/components/parameters/vendorSpecificParameters'
      - $ref: '#/components/parameters/skipGeometry'
      - $ref: https://raw.githubusercontent.com/opengeospatial/ogcapi-records/master/core/openapi/parameters/sortby.yaml
      - $ref: '#/components/parameters/offset'
      - explode: false
        in: query
        name: objid
        required: false
        schema:
          description: Unik identifikator for objektet.
          filterable: false
          sortable: false
          title: Objekt-ID
          type: string
        style: form
      - explode: false
        in: query
        name: datafangstdato
        required: false
        schema:
          description: Dato når dataene ble fanget.
          filterable: true
          format: date
          sortable: true
          title: Datafangstdato
          type: string
        style: form
      - explode: false
        in: query
        name: oppdateringsdato
        required: false
        schema:
          description: Dato for siste oppdatering av objektet.
          filterable: true
          format: date
          sortable: true
          title: Oppdateringsdato
          type: string
        style: form
      - explode: false
        in: query
        name: datauttaksdato
        required: false
        schema:
          description: Dato for datauttaket.
          filterable: true
          format: date
          sortable: true
          title: Datauttaksdato
          type: string
        style: form
      - explode: false
        in: query
        name: opphav
        required: false
        schema:
          description: Kilde eller opphav til dataene.
          filterable: true
          sortable: false
          title: Opphav
          type: string
        style: form
      - explode: false
        in: query
        name: malemetode
        required: false
        schema:
          description: Metode brukt for måling.
          filterable: true
          sortable: false
          title: Målemetode
          type: string
        style: form
      - explode: false
        in: query
        name: noyaktighet
        required: false
        schema:
          description: Nøyaktighet i meter.
          filterable: true
          sortable: true
          title: Nøyaktighet
          type: integer
        style: form
      - explode: false
        in: query
        name: synbarhet
        required: false
        schema:
          description: Objektets synbarhet.
          filterable: true
          sortable: false
          title: Synbarhet
          type: string
        style: form
      - explode: false
        in: query
        name: medium
        required: false
        schema:
          description: Medium objektet befinner seg i.
          filterable: true
          sortable: false
          title: Medium
          type: string
        style: form
      - explode: false
        in: query
        name: verifiseringsdato
        required: false
        schema:
          description: Dato for verifisering av objektet.
          filterable: true
          format: date
          sortable: true
          title: Verifiseringsdato
          type: string
        style: form
      - explode: false
        in: query
        name: informasjon
        required: false
        schema:
          description: Tilleggsinformasjon om objektet.
          filterable: false
          sortable: false
          title: Informasjon
          type: string
        style: form
      - explode: false
        in: query
        name: fylkesnummer
        required: false
        schema:
          description: Tresifret nummeridentifikasjon for fylke.
          filterable: true
          sortable: true
          title: Fylkesnummer
          type: string
        style: form
      - explode: false
        in: query
        name: fylkesnavn
        required: false
        schema:
          description: Navn på fylket.
          filterable: true
          sortable: true
          title: Fylkesnavn
          type: string
        style: form
