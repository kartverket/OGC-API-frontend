name-template: 'Pygeoapi v$RESOLVED_VERSION'
tag-template: 'pygeoapi-v$RESOLVED_VERSION'
tag-prefix: 'pygeoapi-'
include-labels:
  - 'pygeoapi'
  - 'docker'
categories:
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Bug Fixes'
    labels: ['bug', 'fix']
  - title: '🔧 Maintenance'
    labels: ['chore', 'dependencies', 'github_actions']
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
version-resolver:
  major:
    labels: ['breaking']
  minor:
    labels: ['feature', 'enhancement']
  patch:
    labels: ['bug', 'fix', 'chore', 'dependencies', 'github_actions']
  default: patch
template: |
  ## What's Changed
  $CHANGES
