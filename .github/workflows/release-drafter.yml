name: Release Drafter

on:
  push:
    branches: [main]

jobs:
  draft-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter-frontend.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  draft-pygeoapi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter-pygeoapi.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
