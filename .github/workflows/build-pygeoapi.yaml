name: Pygeoapi
# This workflow builds the backend image and pushes it to the GitHub Container Registry.
# It is triggered on pushes to the main branch, specifically when changes are made to the "deploy/pygeoapi" directory.
on:
  push:
    branches:
      - main
    paths:
      - "deploy/pygeoapi/**"

env:
  DOCKER_REGISTRY: ghcr.io
  NAME: kartverket/datadeling-ogcapi-pygeoapi

jobs:
  build_pygeoapi:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read
      id-token: write

    outputs:
      version: ${{ steps.set_output.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
      commit_message: ${{ steps.get_commit_message.outputs.commit_message }}
      image_digest: ${{ steps.build_pygeoapi.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.NAME}}
          tags: |
            type=sha,format=long

      - name: Get commit message
        id: get_commit_message
        run: |
          {
            echo 'commit_message<<EOF'
            git log -1 --pretty=%B
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build docker image and push
        id: build_pygeoapi
        uses: docker/build-push-action@v6
        with:
          context: deploy/pygeoapi
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true

      - name: Summarize Image Digest and Set Output
        id: set_output
        run: |
          echo "Full Image URL: ${{ env.DOCKER_REGISTRY }}/${{ env.NAME }}:${{ steps.meta.outputs.version }}@${{steps.build_pygeoapi.outputs.digest}}" >> $GITHUB_STEP_SUMMARY
          echo "version=${{ github.ref_name }}@${{steps.build_pygeoapi.outputs.digest}}" >> $GITHUB_OUTPUT

  run-pharos:
    name: Run Pharos
    runs-on: ubuntu-latest
    needs: build_pygeoapi
    # Only run on pushes to default branch
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    permissions:
      actions: read
      packages: read
      contents: read
      security-events: write
    steps:
      - name: "Run Pharos"
        uses: kartverket/pharos@v0.6.2
        with:
          image_url: ${{ env.DOCKER_REGISTRY }}/${{ env.NAME}}@${{ needs.build_pygeoapi.outputs.image_digest }}

