name: Frontend
# This workflow builds the frontend image and pushes it to the GitHub Container Registry.
# It is triggered on pushes to the main branch, specifically when changes are made to the "geonorge-server" directory.
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'deploy/**'

env:
  docker_registry: ghcr.io
  image_name: kartverket/datadeling-ogcapi-frontend
  argo_version_file: ogcapi-frontend-version

jobs:
  build_frontend:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read
      id-token: write

    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      commit_message: ${{ steps.get_commit_message.outputs.commit_message }}
      image_url: ${{ steps.set_output.outputs.image_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get package version
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.docker_registry }}/${{ env.image_name}}
          tags: |
            type=sha,format=long
            ${{ steps.pkg.outputs.version }}

      - name: Get commit message
        id: get_commit_message
        run: |
          {
            echo 'commit_message<<EOF'
            git log -1 --pretty=%B
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Login to Github Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.docker_registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build docker image and push
        id: build_frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true

      - name: Summarize Image Digest and Set Output
        id: set_output
        run: |
          echo "Full Image URL: ${{ env.docker_registry }}/${{ env.image_name }}:${{ steps.meta.outputs.version }}@${{steps.build_frontend.outputs.digest}}" >> $GITHUB_STEP_SUMMARY
          echo "image_url=${{ env.docker_registry }}/${{ env.image_name }}:${{ steps.meta.outputs.version }}@${{steps.build_frontend.outputs.digest}}" >> $GITHUB_OUTPUT

  run-pharos:
    name: Run Pharos
    runs-on: ubuntu-latest
    needs: build_frontend
    # Only run on pushes to default branch
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    permissions:
      actions: read
      packages: read
      contents: read
      security-events: write
    steps:
      - name: "Run Pharos"
        uses: kartverket/pharos@v0.6.3
        with:
          image_url: ${{ needs.build_frontend.outputs.image_url }}

  argo:
    name: Update version in apps-repo
    needs: build_frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Fetch token
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: kartverket/datadeling-apps
          identity: OGC-API-frontend
      - name: Checkout apps-repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: kartverket/datadeling-apps
          ref: main
          token: ${{ steps.octo-sts.outputs.token }}
      - name: Update version
        run: |
          echo "\"${{ needs.build_frontend.outputs.image_url }}\"" > "env/atgcp1-dev/datadeling-ogcapi/${{ env.argo_version_file }}"
          git config --global user.email "noreply@kartverket.no"
          git config --global user.name "Dataprodukter CI"
          git commit -am "Update OGC API ${{ env.argo_version_file }}"
          git push
