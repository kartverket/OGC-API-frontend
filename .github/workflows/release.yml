name: Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Full git tag, e.g. frontend-v0.2.0'
        required: true
        type: string
      version:
        description: 'Semver string, e.g. 0.2.0'
        required: true
        type: string
      image_name:
        description: 'GHCR image name, e.g. kartverket/datadeling-ogcapi-frontend'
        required: true
        type: string
      build_context:
        description: 'Docker build context path'
        required: true
        type: string
      drafter_config:
        description: 'release-drafter config filename, e.g. release-drafter-frontend.yml'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Derive version prefix
        id: ver
        env:
          VERSION: ${{ inputs.version }}
        run: |
          PREFIX=$(echo "$VERSION" | cut -d. -f1-2)
          echo "PREFIX=$PREFIX" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.build_context }}
          push: true
          tags: |
            ghcr.io/${{ inputs.image_name }}:${{ inputs.version }}
            ghcr.io/${{ inputs.image_name }}:${{ steps.ver.outputs.PREFIX }}
            ghcr.io/${{ inputs.image_name }}:latest

      - name: Publish GitHub Release
        uses: release-drafter/release-drafter@v7
        with:
          config-name: ${{ inputs.drafter_config }}
          publish: true
          tag: ${{ inputs.tag }}
