name-template: 'Frontend v$RESOLVED_VERSION'
tag-template: 'frontend-v$RESOLVED_VERSION'
include-labels:
  - 'frontend'
categories:
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Bug Fixes'
    labels: ['bug', 'fix']
  - title: '🔧 Maintenance'
    labels: ['chore', 'deps', 'ci']
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
version-resolver:
  major:
    labels: ['breaking']
  minor:
    labels: ['feature', 'enhancement']
  patch:
    labels: ['bug', 'fix', 'chore', 'deps', 'ci']
  default: patch
template: |
  ## What's Changed
  $CHANGES
